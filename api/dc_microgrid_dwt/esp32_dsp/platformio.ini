[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -O2
    -Wall
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0

; Native environment for host-side unit testing (no ESP32 needed)
[env:native]
platform = native
build_flags =
    -O2
    -Wall
    -std=c++17
    -DNATIVE_TEST
test_build_src = yes
